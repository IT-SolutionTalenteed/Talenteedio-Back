name: Deploy Back (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TALENTEED_HOST }}
          username: ${{ secrets.SSH_TALENTEED_USERNAME }}
          password: ${{ secrets.SSH_TALENTEED_PASSWORD }}
          port: ${{ secrets.SSH_TALENTEED_PORT }}
          script: |
            set -e   # stop if any command fails
            echo "🚀 Deploying Talenteed backend..."
            cd /home/talenteedio/sites/Talenteed-Back/
            ./scripts/deploy_prod.sh
            echo "✅ Backend deployed successfully"